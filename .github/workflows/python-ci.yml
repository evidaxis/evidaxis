name: python-ci

# Quality gate for the collector (etl/). Runs the public test suite with a coverage
# floor on every change to the ETL code, its tests, or the deposited genesis copy.
#
# Scope note: spine/ is gitignored (private future-v3 architecture), so it is NOT part
# of this public CI. The spine's proving-run-gate (spine/ci_gate.py) is a LOCAL
# discipline run before a mint, not a GitHub workflow. See AUDIT-BASELINE.md §CI.

on:
  push:
    paths:
      - "etl/**"
      - "tests/**"
      - "collectors/**"
      - "data/observations/**"
      - "genesis-deposit/code/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "etl/**"
      - "tests/**"
      - "collectors/**"
      - "data/observations/**"
      - "genesis-deposit/code/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev/QA toolchain
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Unit tests + coverage floor (etl/ — public; spine/ excluded by design)
        run: >-
          python -m pytest tests/
          --cov=collect --cov=archive_pin --cov=indexnow --cov=reclass_pre_spine
          --cov=t2_collect --cov=t2_deps_collect
          --cov-report=term-missing --cov-fail-under=85

      - name: Lint (ruff — real-defect ruleset, non-style)
        run: ruff check etl tests collectors

      - name: Drift guard — deposited genesis code matches live etl/
        run: python -m pytest tests/test_genesis_deposit_sync.py -q
