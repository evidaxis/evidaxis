name: mirror-push

# Continuity layer 2 (TRUST-ROOT): push every main commit to an independent-forge
# mirror over SSH (deploy key). ACTIVE once the GitLab project accepts the public key
# (KEEPER-ACTIONS item 5). A mirror outage never fails the snapshot pipelines.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mirror-push
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Check mirror configured
        id: cfg
        env:
          MIRROR_SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
        run: |
          if [ -z "$MIRROR_SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "mirror SSH key absent — skipping"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        if: steps.cfg.outputs.configured == 'true'
        with:
          fetch-depth: 0
      - name: Push to GitLab mirror over SSH
        if: steps.cfg.outputs.configured == 'true'
        env:
          MIRROR_SSH_KEY: ${{ secrets.MIRROR_SSH_KEY }}
          MIRROR_SSH_URL: ${{ secrets.MIRROR_SSH_URL }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$MIRROR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 gitlab.com >> ~/.ssh/known_hosts 2>/dev/null
          URL="${MIRROR_SSH_URL:-git@gitlab.com:evidaxis/evidaxis.git}"
          git push --force-with-lease "$URL" main:main || {
            echo "::warning::mirror push failed — origin unaffected"; exit 0; }
