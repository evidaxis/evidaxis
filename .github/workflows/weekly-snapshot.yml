name: weekly-snapshot

# Evidaxis heartbeat — laptop-independent. Runs on GitHub's servers, not the keeper's machine.
# Interim (pre-spine): re-snapshots the current set with the v2 collector, then re-classes the
# output PROVISIONAL (PRE_INGEST_CONTRACT §1.2) so it never poisons the real v3 t=0 baseline.
# Re-point at the v3 survey refresh once the thin spine (S1/PR1) lands.
#
# Hardening (2026-07-02): shared `data-commits` concurrency group + rebase-retry push
# (Saturday race vs t2-daily), completeness gate (no entity leaves the universe silently),
# history-ledger check, pinned actions, no persisted credentials, failure alert issue.

on:
  schedule:
    - cron: "17 6 * * 6"   # Saturdays 06:17 UTC, weekly
  workflow_dispatch: {}     # allow manual run from the Actions tab

permissions:
  contents: write           # commit the new snapshot back to the repo
  issues: write             # failure alert

concurrency:
  group: data-commits       # shared with t2-daily-snapshot: serializes data/ pushes
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false   # push happens via explicit token URL in the commit step

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Collect snapshot (v2, stdlib-only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # higher rate limit; provided natively
        run: python3 etl/collect.py

      - name: Completeness gate (no silent drops from the universe)
        # The frozen collector drops an entity silently when GitHub stats stay 202
        # through all retries (2026-07-01 lost 5/108 — see that snapshot's ERRATA.md).
        # Writes dropped.json; FAILS on a missing previously-tracked entity.
        run: python3 collectors/completeness_gate.py --date "$(date -u +%Y-%m-%d)"

      - name: Re-class as PROVISIONAL (pre-spine, idempotent)
        run: python3 etl/reclass_pre_spine.py

      - name: Map snapshot onto taxonomy v2 (frozen collect.py emits tax_1)
        # collect.py is byte-frozen and emits the v1 taxonomy + tax_1 nodes.json; this
        # deterministic post-step remaps the fresh snapshot to the locked v2 (field/cohort)
        # and restores the canonical v2 nodes.json, so the heartbeat stays v2-consistent.
        run: python3 collectors/taxonomy_v2.py --date "$(date -u +%Y-%m-%d)"

      - name: Refresh snapshot checksums (mandatory FINAL content step)
        # collect.py writes SHA256SUMS, but reclass_pre_spine.py and taxonomy_v2.py
        # mutate snapshot.json/manifest.json AFTER the sums are written. Re-hash the
        # bundle so published sums match published bytes (see 2026-07-01 ERRATA.md).
        # Nothing may mutate snapshot files after this step.
        run: |
          python3 collectors/refresh_sums.py --date "$(date -u +%Y-%m-%d)"
          python3 collectors/refresh_sums.py --verify

      - name: History ledger must resolve (no phantom snapshot ids)
        run: python3 collectors/history_ledger_check.py

      - name: Merkle-anchor the archive (integrity root + OpenTimestamps)
        # Compact, un-forgeable witness that the WHOLE data/ archive existed as-is
        # at time T. Roots are APPEND-ONLY (timestamped files, chained via prev_root);
        # an integrity witness is never rewritten in place.
        run: |
          python3 collectors/merkle_root.py
          python3 collectors/merkle_root.py --verify
          pip install --quiet "opentimestamps-client==0.7.2" || echo "ots install failed; stamp skipped this run"
          FILE=$(ls data/integrity/archive-root-*.json | sort | tail -1)
          if [ -f "$FILE" ] && command -v ots >/dev/null 2>&1; then
            ots stamp "$FILE" || echo "ots stamp deferred (calendar unreachable)"
          fi

      - name: Commit snapshot if changed (rebase-retry against concurrent data pushes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "Evidaxis"
          git config user.email "git@evidaxis.org"
          git add data/
          if git diff --cached --quiet; then
            echo "no snapshot change this week"
            exit 0
          fi
          git commit -m "snapshot: weekly heartbeat (provisional, automated)"
          for i in 1 2 3; do
            if git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main; then
              exit 0
            fi
            echo "push rejected (concurrent data commit?) - rebase and retry ($i/3)"
            git pull --rebase "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
          done
          echo "push failed after 3 rebase attempts"
          exit 1

      - name: Ask Software Heritage to re-archive the repository
        # Keeps an independent off-GitHub copy of the full git history current.
        run: |
          curl -fsS -X POST "https://archive.softwareheritage.org/api/1/origin/save/git/url/https://github.com/${GITHUB_REPOSITORY}/" \
            || echo "SWH save request deferred"

      - name: Alert on failure (issue in this repo)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "weekly-snapshot FAILED $(date -u +%Y-%m-%d)" \
            --body "The weekly heartbeat run failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} — a missed week is a permanent gap in the series; investigate and re-run." \
            || true
