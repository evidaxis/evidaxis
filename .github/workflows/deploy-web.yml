name: deploy-web

# STAGED: production deploy from CI, so prod HTML is a pure function of the
# committed tree and the keeper's laptop leaves the trust chain (2026-07-02
# full-analysis finding: laptop-built prod HTML has no provenance against git).
#
# Activation requires the VERCEL_TOKEN secret (Vercel account token) plus
# VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets. Until then this workflow is
# manual-only and fails fast with a clear message instead of deploying.

# ACTIVATED 2026-07-11: VERCEL_* secrets set; prod HTML is now a pure function of
# the committed tree (map#16 closed). deploy.sh remains the manual fallback.
on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['web/**', 'data/snapshots/**', 'data/latest.json']

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Require Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets are not set."
            echo "Set them in repo settings to activate CI deploys (see deploy.sh fast-follow note)."
            exit 1
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Build the static site from the committed tree
        run: |
          cd web
          npm ci
          npm run build
          npm run check

      - name: Deploy prebuilt dist to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd web
          cp vercel.json dist/vercel.json
          mkdir -p dist/.vercel
          printf '{"projectId":"%s","orgId":"%s"}\n' "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > dist/.vercel/project.json
          cd dist
          npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
