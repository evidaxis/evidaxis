# Machine-readable license map (REUSE.software spec). Companion to LICENSING.md.
# Evidaxis is multi-licensed by component; this file pins each path to its SPDX id
# so scanners (GitHub, Zenodo, SPDX/SBOM tools) do not infer a single wrong license.
version = 1
SPDX-PackageName = "Evidaxis"
SPDX-PackageSupplier = "Evidaxis <hello@evidaxis.org>"
SPDX-PackageDownloadLocation = "https://github.com/evidaxis/evidaxis"

[[annotations]]
path = ["etl/**", "web/src/**", "web/scripts/**", "spine/**.py", "tests/**", "*.toml", "requirements-dev.txt"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Evidaxis <hello@evidaxis.org>"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = ["data/**", "entities/**", "taxonomy/**", "relationships.tsv", "redirects.yaml"]
precedence = "aggregate"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = ["web/src/pages/methodology/**"]
precedence = "override"
SPDX-FileCopyrightText = "2026 Evidaxis <hello@evidaxis.org>"
SPDX-License-Identifier = "CC-BY-4.0"

[[annotations]]
path = ["web/public/fonts/*.woff", "web/public/fonts/*.woff2"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2017 IBM Corp.; 2021 The Familjen Grotesk Project Authors"
SPDX-License-Identifier = "OFL-1.1"

# Genesis Zenodo deposit: CC0 public-domain dedication of its frozen contents
# (genesis.jsonld declares CC0-1.0; see LICENSING.md for the repo-Apache vs deposit-CC0 dual-track).
[[annotations]]
path = ["genesis-deposit/**"]
precedence = "override"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"
